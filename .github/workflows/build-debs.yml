name: build-debs

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      IMAGE: ubuntu:24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare output directory
        run: mkdir -p "$GITHUB_WORKSPACE/.ci/artifacts"

      - name: Write container build script
        run: |
          set -euo pipefail
          mkdir -p .ci
          cat >.ci/build.sh <<'SAFELIBS_PORT_CI_SCRIPT'
          set -euo pipefail
          trap 'chown -R "${HOST_UID}:${HOST_GID}" /workspace/source /workspace/output' EXIT
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            devscripts \
            dpkg-dev \
            equivs \
            fakeroot \
            file \
            git \
            jq \
            python3 \
            rsync \
            xz-utils
          python3 - <<'PY'
          from pathlib import Path
          import shutil

          repo_root = Path(".")
          copies = {
              "original/bzip2.c": "safe/bzip2.c",
              "original/bzip2recover.c": "safe/bzip2recover.c",
              "original/bzdiff": "safe/bzdiff",
              "original/bzgrep": "safe/bzgrep",
              "original/bzmore": "safe/bzmore",
              "original/bzip2.1": "safe/bzip2.1",
              "original/bzgrep.1": "safe/bzgrep.1",
              "original/bzmore.1": "safe/bzmore.1",
              "original/bzdiff.1": "safe/bzdiff.1",
              "original/manual.xml": "safe/manual.xml",
              "original/entities.xml": "safe/entities.xml",
              "original/manual.html": "safe/manual.html",
              "original/manual.pdf": "safe/manual.pdf",
              "original/manual.ps": "safe/manual.ps",
              "original/debian/bzexe": "safe/debian/bzexe",
              "original/debian/bzexe.1": "safe/debian/bzexe.1",
              "original/debian/bzip2-doc.docs": "safe/debian/bzip2-doc.docs",
              "original/debian/bzip2-doc.doc-base": "safe/debian/bzip2-doc.doc-base",
              "original/debian/bzip2-doc.info": "safe/debian/bzip2-doc.info",
          }

          for source_rel, dest_rel in copies.items():
              source = repo_root / source_rel
              dest = repo_root / dest_rel
              if not source.exists():
                  raise SystemExit(f"missing required staged asset: {source}")
              dest.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, dest)
          PY
          git config --global --add safe.directory /workspace/source
          cd safe
          mk-build-deps -i -r -t "apt-get -y --no-install-recommends" debian/control
          dpkg-buildpackage -us -uc -b
          cp -v ../*.deb "$SAFEAPTREPO_OUTPUT"/
          SAFELIBS_PORT_CI_SCRIPT
          chmod +x .ci/build.sh

      - name: Build safe debs
        run: |
          set -euo pipefail
          docker run --rm \
            --mount "type=bind,src=$GITHUB_WORKSPACE,dst=/workspace/source" \
            --mount "type=bind,src=$GITHUB_WORKSPACE/.ci/artifacts,dst=/workspace/output" \
            -w /workspace/source \
            -e SAFEAPTREPO_SOURCE=/workspace/source \
            -e SAFEAPTREPO_OUTPUT=/workspace/output \
            -e SAFEDEBREPO_SOURCE=/workspace/source \
            -e SAFEDEBREPO_OUTPUT=/workspace/output \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            "$IMAGE" \
            bash /workspace/source/.ci/build.sh

      - name: List built artifacts
        run: ls -la .ci/artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs
          path: .ci/artifacts/*.deb
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:12}"
          tag="build-${short_sha}"
          title="Build ${short_sha}"
          notes="Automated safe-deb build of ${GITHUB_SHA} for $(date -u +%FT%TZ)."
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" --repo "$GITHUB_REPOSITORY" --clobber .ci/artifacts/*.deb
          else
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes "$notes" \
              --target "$GITHUB_SHA" \
              .ci/artifacts/*.deb
          fi
